<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>送信完了 | Ａｕｄｒｅｙ合同会社</title>

  <!-- Web Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Favicon / OGP -->
  <link rel="icon" type="image/png" href="favicon.png">
  <meta property="og:title" content="Ａｕｄｒｅｙ合同会社">
  <meta property="og:description" content="感情をつなぐ、テクノロジー。">
  <meta property="og:image" content="ogp.png">
  <meta property="og:url" content="https://adry.jp/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <style>
    :root {
      --color-background-canvas: #F7F7F8;
      --color-background-surface: #EEEFF1;
      --color-border-default: #DEDEE3;
      --color-text-primary: #17181C;
      --color-text-secondary: #3F404A;
      --color-brand-primary: #27FE12;
      --color-brand-hover: #1CD10B;
      --color-brand-active: #16A608;
      --color-brand-indigo-300: #9EFE95;
      --color-brand-indigo-400: #6BFE5D;
      --color-accent-highlight: #D7D342;
      --text-on-brand: #17181C;
      --primary: var(--color-brand-primary);
      --primary-hover: var(--color-brand-hover);
      --primary-active: var(--color-brand-active);
      --dark: var(--color-text-primary);
      --light: var(--color-background-surface);
      --grey: var(--color-background-canvas);
      --border: var(--color-border-default);
      --text-secondary: var(--color-text-secondary);
      --radius: 0.75rem;
      --shadow: 0 6px 16px rgba(0,0,0,0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-canvas: #17181C;
        --color-background-surface: #28282F;
        --color-border-default: #3F404A;
        --color-text-primary: #F7F7F8;
        --color-text-secondary: #DEDEE3;
        --color-brand-primary: #6BFE5D;
        --color-brand-hover: #9EFE95;
        --color-brand-active: #27FE12;
        --color-brand-indigo-300: #9EFE95;
        --color-brand-indigo-400: #6BFE5D;
        --color-accent-highlight: #D7D342;
      }
    }
    *,*::before,*::after { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: 'Poppins', 'Helvetica Neue', sans-serif;
      background: var(--grey);
      color: var(--dark);
      line-height: 1.6;
    }
    a { color: var(--primary); text-decoration: none; }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: var(--light);
      box-shadow: var(--shadow);
    }
    nav a {
      margin-left: 1.25rem;
      color: var(--dark);
      position: relative;
      padding-bottom: 4px;
    }
    nav a:hover,
    nav a[aria-current="page"] {
      color: var(--primary);
    }
    nav a[aria-current="page"]::after {
      content:"";
      position:absolute; left:0; right:0; bottom:0;
      height:2px;
      background: var(--primary);
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .hero {
      background: linear-gradient(135deg, var(--color-brand-indigo-400) 0%, var(--primary) 55%, var(--color-accent-highlight) 100%);
      color: var(--text-on-brand);
      text-align: center;
      padding: 5rem 1rem;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      animation: fadeIn 1s ease-out;
    }
    .hero h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    .hero p {
      opacity: .9;
      font-size: 1.05rem;
    }

    .card {
      background: var(--light);
      border-radius: var(--radius);
      padding: 2rem;
      margin-top: 2rem;
      text-align: center;
      box-shadow: var(--shadow);
      animation: fadeIn .5s ease-out;
    }

    .btn-back {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: var(--primary);
      color: var(--text-on-brand);
      border-radius: 999px;
      font-weight: 600;
      transition: background .25s;
    }
    .btn-back:hover {
      background: var(--primary-hover);
    }

    footer {
      text-align: center;
      padding: 2rem 1rem 3rem;
      color: var(--text-secondary);
      font-size: .85rem;
    }
    footer a { margin: 0 0.4rem; }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(22px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>

<body>
  <header>
    <img src="../assets/greenLogo.png" alt="Adryロゴ" style="height:36px;">
    <nav>
      <a href="/">ホーム</a>
      <a href="/terms/">利用規約</a>
      <a href="/guidelines/">ガイドライン</a>
      <a href="/privacy/">プライバシーポリシー</a>
      <a href="/data-ai/">データ・AI</a>
      <a href="/support/" aria-current="page">問い合わせ</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>送信が完了しました</h1>
      <p>お問い合わせありがとうございました。<br>確認し次第、担当よりご返信いたします。</p>
    </section>

    <div class="card">
      <p>通常 ５〜７ 営業日以内にご返信いたします。 内容によってはお時間をいただく場合があります。<br>しばらくお待ちくださいませ。</p>


      <a href="/" class="btn-back">トップへ戻る</a>
    </div>
  </main>

  <footer>
    © 2025 Ａｕｄｒｅｙ合同会社. All rights reserved. |
    <a href="/terms/">利用規約</a> |
    <a href="/guidelines/">ガイドライン</a> |
    <a href="/privacy/">プライバシーポリシー</a> |
    <a href="/data-ai/">データ・AI</a> |
    <a href="/support/">問い合わせ</a>
  </footer>

</body>
</html>
