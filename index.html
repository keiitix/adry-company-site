    // 🎞️ ヒーロースライダー制御
    let heroSliderTimer = null;

    function setupHeroSlider() {
      const slider = document.querySelector('[data-hero-slider]');
      if (!slider) return;

      const slides = Array.from(slider.querySelectorAll('.hero-slide'));
      if (slides.length === 0) return;

      let currentIndex = 0;

      const showSlide = (index) => {
        slides.forEach((slide, i) => slide.classList.toggle('is-active', i === index));
      };

      showSlide(currentIndex);

      if (heroSliderTimer) {
        clearInterval(heroSliderTimer);
      }

      heroSliderTimer = setInterval(() => {
        currentIndex = (currentIndex + 1) % slides.length;
        showSlide(currentIndex);
      }, 5200);
    }

    function stopHeroSlider() {
      if (!heroSliderTimer) return;
      clearInterval(heroSliderTimer);
      heroSliderTimer = null;
    }

    // 🧭 Adryページ制御
    let adryAutoScrollTimer = null;
    let adryResumeTimer = null;
    let adryCleanup = null;

    function setupAdryLineAnimation(container) {
      const paths = Array.from(container.querySelectorAll('[data-adry-path]'));
      if (paths.length === 0) return () => {};

      paths.forEach((path) => {
        const length = path.getTotalLength();
        path.style.strokeDasharray = `${length}`;
        path.style.strokeDashoffset = `${length}`;
      });

      if (!('IntersectionObserver' in window)) {
        paths.forEach((path) => path.classList.add('is-drawing'));
        return () => {};
      }

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (!entry.isIntersecting) return;
            entry.target.classList.add('is-drawing');
            observer.unobserve(entry.target);
          });
        },
        { threshold: 0.6 }
      );

      paths.forEach((path) => observer.observe(path));

      return () => observer.disconnect();
    }

    function setupAdryPage() {
      const container = document.querySelector('[data-adry-scroll]');
      if (!container) return;

      const sections = Array.from(container.querySelectorAll('[data-adry-section]'));
      if (sections.length === 0) return;

      let currentIndex = 0;
      const lineCleanup = setupAdryLineAnimation(container);

      const scrollToIndex = (index) => {
        const target = sections[index];
        if (!target) return;
        target.scrollIntoView({ behavior: 'smooth' });
        currentIndex = index;
      };

      const scheduleResume = () => {
        if (adryResumeTimer) {
          clearTimeout(adryResumeTimer);
        }
        adryResumeTimer = setTimeout(() => {
          scheduleAutoScroll();
        }, 1000);
      };

      const stopAutoScroll = () => {
        if (adryAutoScrollTimer) {
          clearTimeout(adryAutoScrollTimer);
          adryAutoScrollTimer = null;
        }
      };

      const scheduleAutoScroll = () => {
        stopAutoScroll();
        const isFinal = currentIndex === sections.length - 1;
        const delay = isFinal ? 15000 : 5000;
        adryAutoScrollTimer = setTimeout(() => {
          const nextIndex = (currentIndex + 1) % sections.length;
          scrollToIndex(nextIndex);
          scheduleAutoScroll();
        }, delay);
      };

      const handleScroll = () => {
        stopAutoScroll();
        currentIndex = Math.round(container.scrollTop / container.clientHeight);
        scheduleResume();
      };

      let wheelLock = false;
      let wheelLockTimer = null;

      const handleWheel = (event) => {
        if (wheelLock) return;
        wheelLock = true;
        stopAutoScroll();
        const direction = event.deltaY > 0 ? 1 : -1;
        const nextIndex = Math.min(
          sections.length - 1,
          Math.max(0, currentIndex + direction),
        );
        if (nextIndex !== currentIndex) {
          scrollToIndex(nextIndex);
        }
        scheduleResume();
        event.preventDefault();
        wheelLockTimer = setTimeout(() => {
          wheelLock = false;
        }, 700);
      };

      container.addEventListener('scroll', handleScroll, { passive: true });
      container.addEventListener('wheel', handleWheel, { passive: false });
      scheduleAutoScroll();

      adryCleanup = () => {
        stopAutoScroll();
        if (adryResumeTimer) {
          clearTimeout(adryResumeTimer);
          adryResumeTimer = null;
        }
        if (wheelLockTimer) {
          clearTimeout(wheelLockTimer);
          wheelLockTimer = null;
        }
        container.removeEventListener('scroll', handleScroll);
        container.removeEventListener('wheel', handleWheel);
        lineCleanup();
      };
    }

    function stopAdryPage() {
      if (!adryCleanup) return;
      adryCleanup();
      adryCleanup = null;
    }

    function resolvePageKey() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('page') === 'adry') return 'adry';
      const pathname = window.location.pathname;
      if (pathname === '/adry' || pathname === '/adry/') return 'adry';
      return 'home';
    }

    const THEME_COLOR_DEFAULT = '#17181C';
    const THEME_COLOR_ADRY = '#1B4D3E';

    function setThemeColor(color) {
      const meta = document.getElementById('theme-color');
      if (!meta) return;
      meta.setAttribute('content', color);
    }

    function updateUrlForKey(key) {
      if (key === 'adry') {
        history.pushState({}, '', '/?page=adry');
        return;
      }
      history.pushState({}, '', '/');
    }

    // 🌟 ページ遷移関数
    function navigateTo(key, options = { updateUrl: true }) {
      stopHeroSlider();
      stopAdryPage();
      const content = document.getElementById('content');
      document.querySelectorAll('nav button, nav a')
        .forEach(el => el.removeAttribute('aria-current'));

      // ✅ クリックされたSPA用ボタンにだけ付け直す
      const active = document.getElementById(`nav-${key}`);
      if (active) active.setAttribute('aria-current', 'page');

      document.body.classList.toggle('adry-mode', key === 'adry');
      setThemeColor(key === 'adry' ? THEME_COLOR_ADRY : THEME_COLOR_DEFAULT);

      if (options.updateUrl) {
        updateUrlForKey(key);
      }

      // ✨ フェード効果＋描画
      content.classList.add('fade-enter');
      setTimeout(() => {
        content.innerHTML = pages[key] || pages.home;
        content.classList.remove('fade-enter');
        content.classList.add('fade-enter-active');
        setTimeout(() => content.classList.remove('fade-enter-active'), 400);
        setupHeroSlider();
        setupAdryPage();
      }, 150);
    }


    // 📧 フォーム送信 (ダミー)
    function handleSubmit(e) {
      e.preventDefault();
      alert('お問い合わせありがとうございます！🎉\n担当者より折り返しご連絡いたします。');
      console.log('✅ お問い合わせフォーム送信完了');
      e.target.reset();
    }

    // ✅ 初期表示
    window.addEventListener('DOMContentLoaded', () => {
      const initialKey = resolvePageKey();
      navigateTo(initialKey, { updateUrl: false });
    });

    // 🔁 ブラウザ戻る/進む対応
    window.addEventListener('popstate', () => {
      const nextKey = resolvePageKey();
      navigateTo(nextKey, { updateUrl: false });
    });
  </script>
